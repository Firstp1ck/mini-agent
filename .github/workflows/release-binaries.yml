name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: packaging/pyinstaller/windows-nsis.spec
            artifact_name: mini-agent-windows-setup
          - os: ubuntu-latest
            spec: packaging/pyinstaller/linux.spec
            artifact_name: mini-agent-linux-app
          - os: macos-latest
            spec: packaging/pyinstaller/macos.spec
            artifact_name: mini-agent-macos-dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies (locked)
        run: uv sync --frozen --all-groups

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            throw "makensis.exe not found at $nsisPath"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build with PyInstaller
        run: uv run pyinstaller ${{ matrix.spec }}

      - name: Normalize Windows NSIS inputs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          foreach ($name in @('mini-agent', 'mini-agent-cli')) {
            $withoutExt = "dist/windows-nsis/$name"
            $withExt = "dist/windows-nsis/$name.exe"
            if ((Test-Path $withoutExt) -and -not (Test-Path $withExt)) {
              Move-Item $withoutExt $withExt
            }
          }

      - name: Verify Windows NSIS inputs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist/windows-nsis | Format-Table FullName, Length
          foreach ($file in @('dist/windows-nsis/mini-agent.exe', 'dist/windows-nsis/mini-agent-cli.exe')) {
            if (-not (Test-Path $file)) {
              throw "Expected NSIS input missing: $file"
            }
          }

      - name: Build NSIS installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($refName)) { $refName = "dev" }
          makensis /NOCD /DVERSION=$refName packaging/windows/mini-agent.nsi

      - name: Package Linux app with desktop icon
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -eux
          mkdir -p dist/linux-package/mini-agent/bin
          mkdir -p dist/linux-package/mini-agent/share/applications
          mkdir -p dist/linux-package/mini-agent/share/icons/hicolor/256x256/apps
          cp dist/linux/mini-agent dist/linux-package/mini-agent/bin/mini-agent
          cp dist/linux/mini-agent-cli dist/linux-package/mini-agent/bin/mini-agent-cli
          cp icon.png dist/linux-package/mini-agent/share/icons/hicolor/256x256/apps/mini-agent.png
          cat > dist/linux-package/mini-agent/share/applications/mini-agent.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=mini-agent
          Comment=Minimal Python coding agent
          Exec=mini-agent
          Icon=mini-agent
          Terminal=false
          Categories=Development;
          EOF
          cat > dist/linux-package/mini-agent/install.sh <<'EOF'
          #!/usr/bin/env sh
          set -eu
          APP_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          BIN_DIR="${HOME}/.local/bin"
          APP_DESKTOP_DIR="${HOME}/.local/share/applications"
          ICON_DIR="${HOME}/.local/share/icons/hicolor/256x256/apps"
          mkdir -p "$BIN_DIR" "$APP_DESKTOP_DIR" "$ICON_DIR"
          cp "$APP_DIR/bin/mini-agent" "$BIN_DIR/mini-agent"
          cp "$APP_DIR/bin/mini-agent-cli" "$BIN_DIR/mini-agent-cli"
          cp "$APP_DIR/share/icons/hicolor/256x256/apps/mini-agent.png" "$ICON_DIR/mini-agent.png"
          cp "$APP_DIR/share/applications/mini-agent.desktop" "$APP_DESKTOP_DIR/mini-agent.desktop"
          chmod +x "$BIN_DIR/mini-agent" "$BIN_DIR/mini-agent-cli"
          command -v update-desktop-database >/dev/null 2>&1 && update-desktop-database "$APP_DESKTOP_DIR" || true
          command -v gtk-update-icon-cache >/dev/null 2>&1 && gtk-update-icon-cache "${HOME}/.local/share/icons/hicolor" >/dev/null 2>&1 || true
          echo "mini-agent installed to $BIN_DIR"
          echo "Run the GUI from your app launcher or with: mini-agent"
          echo "Run the CLI with: mini-agent-cli"
          EOF
          cat > dist/linux-package/mini-agent/uninstall.sh <<'EOF'
          #!/usr/bin/env sh
          set -eu
          rm -f "${HOME}/.local/bin/mini-agent"
          rm -f "${HOME}/.local/bin/mini-agent-cli"
          rm -f "${HOME}/.local/share/applications/mini-agent.desktop"
          rm -f "${HOME}/.local/share/icons/hicolor/256x256/apps/mini-agent.png"
          command -v update-desktop-database >/dev/null 2>&1 && update-desktop-database "${HOME}/.local/share/applications" || true
          command -v gtk-update-icon-cache >/dev/null 2>&1 && gtk-update-icon-cache "${HOME}/.local/share/icons/hicolor" >/dev/null 2>&1 || true
          echo "mini-agent uninstalled from your user account"
          EOF
          chmod +x dist/linux-package/mini-agent/install.sh dist/linux-package/mini-agent/uninstall.sh
          tar -C dist/linux-package -czf dist/linux/mini-agent-linux.tar.gz mini-agent

      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          set -eux
          test -d "dist/macos/mini-agent.app"
          hdiutil create -volname "mini-agent" -srcfolder "dist/macos/mini-agent.app" \
            -ov -format UDZO "dist/macos/mini-agent-macos.dmg"

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/windows-nsis/mini-agent-Setup.exe

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/linux/mini-agent-linux.tar.gz

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macos/mini-agent-macos.dmg

  release:
    name: GitHub Release (tag only)
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: mini-agent-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "release-assets/**"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
